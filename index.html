<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>연두 햄버거의 홀로그램 팬 리사이저</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>홀로그램 팬 이미지 리사이저</h1>

<div class="container">

<!-- 이미지 업로드 -->
<input type="file" id="upload" accept="image/*">

<!-- 가로 cm 입력 -->
<div class="size-input">
<label for="width_cm">가로(cm): </label>
<input type="number" id="width_cm" placeholder="가로 cm" step="0.1" min="0.1" max="18">
</div>

<!-- 리사이즈 버튼 -->
<button id="resizeBtn">리사이즈</button>

<h3>미리보기</h3>
<img id="preview">

<!-- 다운로드 링크 -->
<a id="download">이미지 다운로드</a>

</div>

<script src="script.js"></script>
</body>
</html>
